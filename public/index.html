<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шибениця - Клієнт-Сервер</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffffff;
            flex-direction: column;
        }
        .container {
            background-color: #242424;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            text-align: center;
            margin-bottom: 20px;
        }
        .container h2 { margin-bottom: 5px; color: #ffffff; }
        .subtitle { color: #a0a0a0; margin-bottom: 25px; font-size: 14px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #e0e0e0; font-weight: bold; font-size: 14px; }
        .input-group input {
            width: 100%; padding: 10px; background-color: #333333; color: #ffffff;
            border: 1px solid #444444; border-radius: 6px; box-sizing: border-box;
        }
        .input-group input:focus { outline: none; border-color: #00a8ff; }
        
        .action-btn {
            background-color: #00a8ff; color: white; border: none; padding: 12px;
            width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 10px; transition: background 0.3s;
        }
        .action-btn:hover { background-color: #008ecc; }
        
        #wordDisplay {
            font-size: 28px; letter-spacing: 8px; color: #00a8ff; font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container" id="registerBlock">
    <h2>Реєстрація</h2>
    <div class="subtitle">Приєднуйся до гри "Шибениця"</div>
    
    <div class="input-group">
        <label for="username">Нікнейм</label>
        <input type="text" id="username" placeholder="Введіть ваш нікнейм">
    </div>
    
    <div class="input-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="Створіть пароль">
    </div>
    
    <button class="action-btn">Зареєструватися</button>
</div>

<div class="container" id="gameBlock">
    <h2>Ігрова зона</h2>
    <div class="subtitle">Отримайте слово від сервера</div>
    
    <button class="action-btn">Згенерувати слово</button>
    <div id="wordDisplay">_ _ _ _ _</div>
</div>

<script>
class GameModel {
    constructor() {
        this.token = null; // Тут зберігатимемо унікальний токен
    }

    async registerUser(username, password) {
        const response = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        if (data.success) {
            this.token = data.token; // Зберігаємо токен після реєстрації
        }
        return data;
    }

    async fetchWord() {
        const response = await fetch('/get-word');
        return await response.json();
    }

    // Відправляємо токен на сервер
    async pollServer() {
        if (!this.token) return null;
        const response = await fetch('/poll-status', {
            headers: { 'Authorization': this.token }
        });
        return await response.json();
    }
}

class GameView {
    constructor() {
        this.usernameInput = document.getElementById('username');
        this.passwordInput = document.getElementById('password');
        this.wordDisplay = document.getElementById('wordDisplay');
    }


    getUserData() { return { username: this.usernameInput.value, password: this.passwordInput.value }; }
    renderWord(wordLength) { this.wordDisplay.innerText = '_ '.repeat(wordLength); }
    showMessage(message) { alert(message); }
   
    bindRegisterAction(handler) { document.querySelectorAll('button')[0].addEventListener('click', handler); }
    bindGetWordAction(handler) { document.querySelectorAll('button')[1].addEventListener('click', handler); }
}

class GameController {
    constructor(model, view) {
        this.model = model;
        this.view = view;
        this.view.bindRegisterAction(this.handleRegister.bind(this));
        this.view.bindGetWordAction(this.handleGetWord.bind(this));

        // Вмикаємо Short Polling (кожні 5 секунд питаємо сервер)
        setInterval(() => this.startShortPolling(), 5000);
    }

    async handleRegister() {
        const data = this.view.getUserData();
        if (!data.username || !data.password) return this.view.showMessage("Заповніть поля!");
       
        const result = await this.model.registerUser(data.username, data.password);
        this.view.showMessage(result.message);
    }

    async handleGetWord() {
        const data = await this.model.fetchWord();
        this.view.renderWord(data.wordLength);
    }

    // Функція Short Polling
    async startShortPolling() {
        const status = await this.model.pollServer();
        if (status) {
            console.log(`[Short Polling] Гравців онлайн: ${status.activePlayers}`);
        }
    }
}

const app = new GameController(new GameModel(), new GameView());
</script>

</body>
</html>
